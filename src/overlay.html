<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  #bar {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 24px;
  }
  .team {
    display: flex;
    gap: 4px;
  }
  .slot {
    width: 48px;
    height: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.25);
    position: relative;
    border-radius: 2px;
    overflow: hidden;
  }
  .slot .fill {
    height: 100%;
    transition: width 120ms linear;
  }
  .atk .fill { background: #ff5a46; }
  .def .fill { background: #3ca8ff; }
  .slot.dead {
    background: rgba(40,40,40,0.7);
  }
  .slot.dead::after {
    content: "×";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 10px;
  }
</style>
</head>
<body>
  <div id="bar">
    <div class="team atk" id="atk"></div>
    <div class="team def" id="def"></div>
  </div>
  <script src="overlay-renderer.js"></script>
</body>
</html>
